# Build de la imagen (linux/arm64, la VM Always Free de Oracle es Ampere) y
# despliegue por SSH: pull + up -d del compose de producción en la VM.
# Secrets necesarios: DEPLOY_HOST, DEPLOY_USER, DEPLOY_SSH_KEY (clave privada
# ed25519 dedicada). GITHUB_TOKEN basta para publicar en ghcr.io.
name: Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      # QEMU para compilar arm64 desde el runner x86 (better-sqlite3 es nativo).
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          push: true
          # ghcr exige el nombre en minúsculas, por eso no se usa github.repository.
          tags: |
            ghcr.io/javibite/crochety:latest
            ghcr.io/javibite/crochety:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd ~/crochety
            git pull --ff-only
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d
            docker image prune -f

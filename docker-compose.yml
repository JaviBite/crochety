services:
  crochety:
    build: .
    container_name: crochety
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      # Rutas dentro del contenedor: sobreescriben las del .env de desarrollo.
      DATABASE_URL: "file:/app/data/crochety.db"
      UPLOAD_DIR: "/app/uploads"
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
    restart: unless-stopped
